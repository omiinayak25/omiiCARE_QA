# =============================================================================
# TEST profile — in-memory H2 for automated test execution (fast, isolated).
# Integration tests that need real PostgreSQL use Testcontainers, not this file.
# =============================================================================
spring:
  datasource:
    url: jdbc:h2:mem:omiicare_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    locations: classpath:db/migration,classpath:db/seed

logging:
  level:
    com.omiicare.qa: INFO
