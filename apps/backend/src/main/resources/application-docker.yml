# =============================================================================
# DOCKER profile — full containerized stack. Connects to the PostgreSQL service
# defined in infrastructure/docker/docker-compose.yml by its service hostname.
# =============================================================================
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:omiicare}
    username: ${DB_USERNAME:omiicare}
    password: ${DB_PASSWORD:omiicare}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: omiicare-docker-pool
      maximum-pool-size: 15
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    locations: classpath:db/migration,classpath:db/seed

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.omiicare.qa: INFO
