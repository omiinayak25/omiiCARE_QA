# ==============================================================================
# SonarQube project configuration — omiiCARE_QA enterprise healthcare QA platform
# ------------------------------------------------------------------------------
# Multi-module monorepo analysed as a SINGLE SonarQube project so that the
# quality gate is evaluated across the whole reactor (backend + automation + ai)
# plus the React/Vite frontend.
#
# Maven reactor modules (verified against root pom.xml <modules>):
#   - apps/backend  (Spring Boot 3 / Java 21)        -> main + test Java
#   - automation    (Java test framework, Java 21)   -> test Java only (no main)
#   - ai            (Java 21)                         -> main + test Java
# Frontend (npm workspace, not in Maven reactor):
#   - apps/frontend (React + TypeScript + Vite)      -> TS sources + tests
#
# Run from repo root. See docs/qa-management/SONARQUBE_AND_QUALITY_GATES.md.
# This file is configuration only and does NOT affect the Maven build.
# ==============================================================================

# --- Project identity ---------------------------------------------------------
sonar.projectKey=omiicare-qa
sonar.projectName=omiiCARE_QA
# Version is kept in sync with the release tag (SemVer 2.0.0). Override in CI
# with -Dsonar.projectVersion=$RELEASE_VERSION.
sonar.projectVersion=1.0.0
sonar.organization=omiicare

# --- Encoding & SCM -----------------------------------------------------------
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git

# ------------------------------------------------------------------------------
# Module declaration (SonarQube multi-module via sonar.modules)
# ------------------------------------------------------------------------------
sonar.modules=backend,automation,ai,frontend

# ==============================================================================
# Module: backend  (apps/backend — Spring Boot 3, Java 21)
# ==============================================================================
backend.sonar.projectBaseDir=apps/backend
backend.sonar.projectName=omiiCARE_QA :: backend
backend.sonar.sources=src/main/java
backend.sonar.tests=src/test/java
backend.sonar.java.binaries=target/classes
backend.sonar.java.test.binaries=target/test-classes
backend.sonar.java.source=21
# JaCoCo XML report (produced by `mvn verify`; report bound to verify phase).
backend.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
# Surefire/Failsafe unit + integration test execution reports.
backend.sonar.junit.reportPaths=target/surefire-reports,target/failsafe-reports

# ==============================================================================
# Module: automation  (automation — Java test framework, Java 21, TEST-ONLY)
# Package: com.omiicare.qa.automation. Has src/test/java only (no src/main).
# Default unit build: `mvn -pl automation test` = 98 unit tests PASS.
# SUT/browser tests are tagged ui-e2e/api-e2e/bdd (-Pe2e), excluded from gate.
# ==============================================================================
automation.sonar.projectBaseDir=automation
automation.sonar.projectName=omiiCARE_QA :: automation
# This module has no production sources; point sources at the test tree so
# Sonar still analyses code quality of the framework itself.
automation.sonar.sources=src/test/java
automation.sonar.tests=src/test/java
automation.sonar.java.binaries=target/test-classes
automation.sonar.java.test.binaries=target/test-classes
automation.sonar.java.source=21
automation.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
automation.sonar.junit.reportPaths=target/surefire-reports
# Node Playwright smoke suites (automation/playwright/) are not Java — excluded
# below and analysed only as part of the frontend TS scope when relevant.

# ==============================================================================
# Module: ai  (ai — Java 21)
# ==============================================================================
ai.sonar.projectBaseDir=ai
ai.sonar.projectName=omiiCARE_QA :: ai
ai.sonar.sources=src/main/java
ai.sonar.tests=src/test/java
ai.sonar.java.binaries=target/classes
ai.sonar.java.test.binaries=target/test-classes
ai.sonar.java.source=21
ai.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
ai.sonar.junit.reportPaths=target/surefire-reports

# ==============================================================================
# Module: frontend  (apps/frontend — React + TypeScript + Vite)
# build/lint/typecheck green. Coverage report path is (planned) — wire a
# `coverage` script (e.g. vitest --coverage) emitting lcov before enforcing.
# ==============================================================================
frontend.sonar.projectBaseDir=apps/frontend
frontend.sonar.projectName=omiiCARE_QA :: frontend
frontend.sonar.sources=src
frontend.sonar.tests=src
# Treat *.test.ts(x) / *.spec.ts(x) as tests; everything else under src is source.
frontend.sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
# LCOV report from the frontend test runner (planned — emit to coverage/lcov.info).
frontend.sonar.javascript.lcov.reportPaths=coverage/lcov.info
frontend.sonar.typescript.tsconfigPath=tsconfig.json

# ==============================================================================
# Global exclusions (applied across all modules)
# ------------------------------------------------------------------------------
sonar.exclusions=\
  **/target/**,\
  **/dist/**,\
  **/build/**,\
  **/node_modules/**,\
  **/generated/**,\
  **/*.min.js,\
  **/vite.config.ts,\
  **/eslint.config.js,\
  **/main.tsx,\
  **/i18n/**,\
  apps/frontend/src/types/**,\
  **/db/migration/**,\
  **/db/changelog/**,\
  infrastructure/**,\
  scripts/**,\
  docs/**,\
  manual-testing/**,\
  postman/**,\
  quality/**,\
  database/**,\
  config/**

# Test files are not subject to production-code rules; keep them out of coverage
# denominator but still analysed for test-smell rules.
sonar.coverage.exclusions=\
  **/*Test.java,\
  **/*IT.java,\
  **/*Tests.java,\
  **/test/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  apps/frontend/src/main.tsx,\
  apps/frontend/src/App.tsx

# Duplication exclusions — generated DTOs, test fixtures, and data generators
# legitimately repeat structure.
sonar.cpd.exclusions=\
  **/dto/**,\
  **/generators/**,\
  **/*Test.java,\
  **/*.spec.ts,\
  **/*.spec.tsx
