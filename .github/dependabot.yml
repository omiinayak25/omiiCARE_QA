# Dependabot — weekly dependency updates for Maven, npm, and GitHub Actions.
version: 2
updates:
  # Maven reactor (root pom + modules resolved transitively).
  - package-ecosystem: maven
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "build(deps)"

  # Frontend npm dependencies.
  - package-ecosystem: npm
    directory: "/apps/frontend"
    target-branch: "develop"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "build(deps)"

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci(deps)"
