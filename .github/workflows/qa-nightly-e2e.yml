# =============================================================================
# qa-nightly-e2e.yml — omiiCARE_QA nightly end-to-end suite
# -----------------------------------------------------------------------------
# Distinct from the existing nightly.yml. This workflow focuses purely on
# end-to-end coverage: it spins up the LOCAL omiiCARE SUT, runs the automation
# -Pe2e suite (Playwright-Java / Selenium / RestAssured / Cucumber tagged
# ui-e2e / api-e2e / bdd) and the Node @playwright/test smoke suites, then
# uploads Playwright traces/screenshots and Allure results.
#
# Verified contract:
#   - automation/pom.xml defines the `e2e` profile (id e2e, line ~180).
#   - Node smoke lives in automation/playwright/ :
#       * tests/         — omiiCARE local smoke   (5/5 PASS headed)
#       * tests-openmrs/ — OpenMRS public smoke    (5/5 PASS headed,
#                          o2.openmrs.org, launch/login/nav/register-CRUD/logout)
#       * configs: playwright.config.ts, playwright.openmrs.config.ts
#       * artifacts: artifacts-openmrs/screenshots/step-1..5, trace.zip, HTML report
#   - Local SUT bring-up: infrastructure/docker/docker-compose.yml +
#     scripts/start.sh (infra) and scripts/health-check.sh (readiness probe).
#
# HARD RULE (enforced here):
#   - Performance/security and any load are NEVER aimed at o2.openmrs.org.
#   - The OpenMRS smoke is gentle, READ-ORIENTED functional smoke only and runs
#     against the public demo at most once nightly; it is allowed to fail
#     softly (continue-on-error) so public-server flakiness never blocks.
# =============================================================================
---
name: QA Nightly E2E

on:
  schedule:
    # 03:15 UTC daily — offset from the existing Nightly (02:30) to avoid
    # contention and to run after the standard nightly build settles.
    - cron: "15 3 * * *"
  workflow_dispatch:
    inputs:
      run_openmrs_smoke:
        description: "Also run the read-only OpenMRS public smoke (o2.openmrs.org)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: qa-nightly-e2e
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Local omiiCARE SUT e2e — Java automation -Pe2e + Node local smoke.
  # ---------------------------------------------------------------------------
  local-sut-e2e:
    name: Local omiiCARE SUT (-Pe2e + Node smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: automation/playwright/package-lock.json

      # Bring up the local infra stack (Postgres/Redis/Keycloak/WireMock/etc.).
      # docker compose is preinstalled on ubuntu-latest runners.
      - name: Start local infra stack
        run: |
          chmod +x scripts/*.sh || true
          ./scripts/start.sh

      # Probe readiness before driving e2e. Advisory so a single slow service
      # does not abort the whole nightly; the e2e steps surface real failures.
      - name: Health check (readiness probe)
        continue-on-error: true
        run: ./scripts/health-check.sh

      # Build the reactor so e2e can resolve sibling modules from the local repo.
      - name: Build reactor (skip tests)
        run: mvn -q -B -ntp -DskipTests install

      # Java end-to-end suite via the automation -Pe2e profile (ui-e2e/api-e2e/bdd).
      - name: Run automation e2e (-Pe2e)
        continue-on-error: true
        run: mvn -B -ntp -pl automation -am test -Pe2e

      # Node @playwright/test — local omiiCARE smoke (headless in CI).
      - name: Install Playwright (Node) deps + browsers
        working-directory: automation/playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Node Playwright smoke (local omiiCARE)
        continue-on-error: true
        working-directory: automation/playwright
        run: npx playwright test --config=playwright.config.ts

      # Stop the infra stack regardless of outcome.
      - name: Stop local infra stack
        if: ${{ always() }}
        run: ./scripts/stop.sh || true

      # ----- Artifact uploads -----
      - name: Upload automation Surefire / Allure results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: qa-nightly-automation-results
          path: |
            automation/target/surefire-reports/**
            automation/target/allure-results/**
            automation/target/site/allure-maven-plugin/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Node Playwright artifacts (local SUT)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: qa-nightly-playwright-local
          path: |
            automation/playwright/playwright-report/**
            automation/playwright/results/**
            automation/playwright/artifacts/**
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------------------
  # OpenMRS public smoke — READ-ORIENTED functional smoke ONLY against
  # o2.openmrs.org. Never load/attack the public server. Soft-fails.
  # ---------------------------------------------------------------------------
  openmrs-readonly-smoke:
    name: OpenMRS public smoke (read-only, o2.openmrs.org)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Default true for the nightly schedule; honor the dispatch toggle.
    if: ${{ github.event_name == 'schedule' || github.event.inputs.run_openmrs_smoke == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: automation/playwright/package-lock.json

      - name: Install Playwright (Node) deps + browsers
        working-directory: automation/playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # Gentle functional smoke only: launch/login/nav/register-patient-CRUD/logout.
      # No load, no stress, no security tooling against the public demo.
      - name: OpenMRS read-only smoke
        continue-on-error: true
        working-directory: automation/playwright
        run: npx playwright test --config=playwright.openmrs.config.ts

      - name: Upload OpenMRS smoke artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: qa-nightly-playwright-openmrs
          path: |
            automation/playwright/playwright-report-openmrs/**
            automation/playwright/results-openmrs/**
            automation/playwright/artifacts-openmrs/**
          if-no-files-found: ignore
          retention-days: 14
