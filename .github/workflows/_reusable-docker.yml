# Reusable Docker build/publish — builds the backend and frontend images using
# the existing Dockerfiles. Images are pushed to GHCR only when push=true
# (release pipeline); for PR/CI runs the build is validated without publishing.
---
name: _reusable-docker

on:
  workflow_call:
    inputs:
      push:
        description: "Push images to GHCR when true; build-only when false"
        required: false
        type: boolean
        default: false
      version:
        description: "Semantic version tag to apply (e.g. 1.0.0)"
        required: false
        type: string
        default: "0.7.0"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner for image names
        id: owner
        run: echo "value=${IMAGE_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: ${{ inputs.push }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/omiicare-qa-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/omiicare-qa-backend:${{ inputs.version }}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          file: apps/frontend/Dockerfile
          push: ${{ inputs.push }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/omiicare-qa-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/omiicare-qa-frontend:${{ inputs.version }}
