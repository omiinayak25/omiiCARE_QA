# Reusable security-scan workflow (SKELETON).
# Milestone 2: structure only. This is wired fully in Milestone 8
# (SARIF upload, fail thresholds, dependency-check NVD caching, etc.).
---
name: _reusable-security-scan

on:
  workflow_call:
    inputs:
      java-version:
        description: "JDK version for dependency resolution"
        required: false
        type: string
        default: "21"

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Filesystem vulnerability scan (deps + IaC). Placeholder for M2;
      # M8 adds SARIF upload and severity gating.
      - name: Trivy filesystem scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "0"

      # Secret scanning.
      - name: Gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
