# =============================================================================
# qa-quality-gate.yml — omiiCARE_QA static-analysis + coverage + Sonar gate
# -----------------------------------------------------------------------------
# Distinct from the existing _reusable-quality.yml. This is a standalone,
# directly-triggerable quality gate that runs the Maven `-Pquality` verify
# chain and, when a SONAR_TOKEN secret is present, a SonarQube scan.
#
# Verified contract:
#   - Root pom.xml defines the `quality` profile (Spotless / Checkstyle / PMD /
#     SpotBugs / JaCoCo wired through it).
#   - `mvn -Pquality verify` produces JaCoCo reports under **/target/site/jacoco.
#   - SonarQube server is available in the local infra stack
#     (infrastructure/docker/docker-compose.yml) for self-hosted scanning.
#
# Notes:
#   - The static-analysis verify step is advisory (continue-on-error) to match
#     the existing _reusable-quality.yml baseline; flip to blocking once
#     severities/baselines are agreed. (planned: make blocking at v1.1.0)
#   - The Sonar job is SKIPPED automatically when SONAR_TOKEN is not configured,
#     so forks and token-less PRs are not failed by a missing secret.
# =============================================================================
---
name: QA Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qa-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Static analysis + coverage via the -Pquality profile.
  # ---------------------------------------------------------------------------
  static-analysis:
    name: Static analysis (-Pquality verify)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Advisory for now (matches _reusable-quality.yml). Remove
      # continue-on-error to make the gate blocking once baselines are agreed.
      - name: Quality verify (Spotless / Checkstyle / PMD / SpotBugs / JaCoCo)
        continue-on-error: true
        run: mvn -B -ntp -Pquality verify

      - name: Upload JaCoCo reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: qa-quality-jacoco
          path: "**/target/site/jacoco/**"
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------------------
  # SonarQube scan — only runs when SONAR_TOKEN is configured.
  # ---------------------------------------------------------------------------
  sonarqube:
    name: SonarQube scan (gated on SONAR_TOKEN)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Gate on the secret: skip entirely on forks / token-less environments.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Sonar needs full history for accurate blame / new-code detection.
          fetch-depth: 0

      - name: Check SONAR_TOKEN presence
        id: sonar_check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "${SONAR_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN not set — skipping SonarQube scan."
          fi

      - name: Set up JDK 21
        if: ${{ steps.sonar_check.outputs.enabled == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Runs the JaCoCo-instrumented build then the Sonar analysis in one pass
      # so coverage is uploaded with the scan. SONAR_HOST_URL points at the
      # self-hosted SonarQube (local infra stack) or SonarCloud.
      - name: SonarQube analysis
        if: ${{ steps.sonar_check.outputs.enabled == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'http://localhost:9000' }}
        run: >
          mvn -B -ntp -Pquality verify
          org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.host.url="${SONAR_HOST_URL}"
          -Dsonar.token="${SONAR_TOKEN}"
          -Dsonar.projectKey=omiicare-qa
