# Entry CI pipeline — the PR/push quality gate for main and develop.
# Composes the reusable backend, frontend, and quality workflows. Milestone 8.
---
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    uses: ./.github/workflows/_reusable-backend.yml

  frontend:
    name: Frontend
    uses: ./.github/workflows/_reusable-frontend.yml

  quality:
    name: Quality Gate
    uses: ./.github/workflows/_reusable-quality.yml
