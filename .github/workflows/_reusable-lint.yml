# Reusable lint / static-analysis workflow (SKELETON).
# Milestone 2: structure only. Full pipeline behaviour lands in Milestone 8.
# Consumes the configs under config/ (checkstyle, pmd, spotbugs, spotless).
---
name: _reusable-lint

on:
  workflow_call:
    inputs:
      java-version:
        description: "JDK version to lint with"
        required: false
        type: string
        default: "21"

jobs:
  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven

      # continue-on-error: lint is advisory in M2. Flip to blocking in M8
      # once severities are raised to error and baselines are agreed.
      - name: Spotless + Checkstyle + PMD
        continue-on-error: true
        run: mvn -B -ntp -Pquality spotless:check checkstyle:check pmd:check
