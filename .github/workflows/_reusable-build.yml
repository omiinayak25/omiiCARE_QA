# Reusable build workflow (SKELETON).
# Milestone 2: structure only. Full pipeline behaviour lands in Milestone 8.
---
name: _reusable-build

on:
  workflow_call:
    inputs:
      java-version:
        description: "JDK version to build with"
        required: false
        type: string
        default: "21"

jobs:
  build:
    name: Build (Maven)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven

      - name: Build (skip tests)
        run: mvn -B -ntp -DskipTests install
