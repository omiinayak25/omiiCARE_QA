# =============================================================================
# OWASP ZAP Baseline Scan Configuration - OpenMRS Reference Application
# =============================================================================
#
# WHAT THIS IS
#   A rule-tuning file for the OWASP ZAP *baseline* scan (zap-baseline.py /
#   the zaproxy/zap-stable Docker image). The baseline scan is PASSIVE: it
#   spiders the target and inspects traffic without launching active attacks,
#   so it is the safest scan to run regularly. This file sets each passive
#   rule to one of:  WARN (report, non-failing) | FAIL (break the build) |
#   IGNORE (suppress known/accepted findings).
#
# !!  OWNED-ENVIRONMENT ONLY  !!
#   Even a "passive" scan spiders the application and issues many requests.
#   RUN ONLY against an OpenMRS instance you OWN or are explicitly AUTHORIZED
#   to test (local Docker / dedicated QA host). NEVER scan o2.openmrs.org,
#   any shared community server, or any production / third-party system.
#   Unauthorized scanning may be illegal and violates the OpenMRS terms.
#
# FILE FORMAT
#   <ruleId>\t<action>\t<optional comment>
#   action = WARN | FAIL | IGNORE
#   Lines beginning with '#' are comments.
#
# HOW TO RUN  (see README.md in this directory for full details)
#   docker run --rm -t \
#     --network host \
#     -v "$(pwd)/quality/security/zap:/zap/wrk:rw" \
#     zaproxy/zap-stable zap-baseline.py \
#       -t http://localhost:8080/openmrs \
#       -c zap-baseline-openmrs.conf \
#       -r zap-baseline-openmrs-report.html \
#       -w zap-baseline-openmrs-report.md \
#       -J zap-baseline-openmrs-report.json
#
# EXIT CODES
#   0 = no FAIL/WARN above threshold   1 = at least one FAIL   2 = at least one
#   WARN (when -I is not set). Use FAIL rules to gate CI on an owned env.
# =============================================================================

# --- Transport / TLS -------------------------------------------------------
10035	WARN	(Strict-Transport-Security header) - expect HTTPS in prod; WARN on local http
10038	FAIL	(Content Security Policy header missing) - CSP is a strong XSS mitigation
10054	WARN	(Cookie without SameSite attribute)
10010	FAIL	(Cookie set without HttpOnly flag) - session cookies must be HttpOnly
10011	FAIL	(Cookie set without Secure flag on HTTPS)

# --- Headers / hardening ---------------------------------------------------
10020	WARN	(Anti-clickjacking / X-Frame-Options missing)
10021	WARN	(X-Content-Type-Options nosniff missing)
10063	WARN	(Permissions-Policy header missing)
10037	IGNORE	(Server version leak via banner) - accepted on owned QA; tune at the proxy in prod
10015	WARN	(Incomplete or no cache-control headers)

# --- Information disclosure -------------------------------------------------
10027	WARN	(Information disclosure - suspicious comments)
10096	WARN	(Timestamp disclosure)
10094	WARN	(Base64 disclosure)
10024	WARN	(Information disclosure - sensitive info in URL)
10025	FAIL	(Information disclosure - sensitive info in HTTP referrer header)

# --- Injection / content-type sniffing -------------------------------------
10031	WARN	(User-controllable charset)
10017	WARN	(Cross-domain misconfiguration)
10098	WARN	(Cross-domain misconfiguration - CORS)
90022	WARN	(Application error disclosure)

# --- OpenMRS-specific noise suppression ------------------------------------
# OpenMRS bundles many static OWA / legacy JSP assets that trip low-signal
# passive rules. These are IGNORED to keep the baseline focused on real issues
# on an owned environment. Re-evaluate before any production sign-off.
10049	IGNORE	(Non-storable content) - expected for dynamic OpenMRS pages
10050	IGNORE	(Retrieved from cache)
10109	IGNORE	(Modern web application heuristic) - OWA SPA shell is expected

# --- Spider / scope hints (informational; real scope is set via -t and -z) --
# Restrict the spider to the OpenMRS context path to avoid wandering off-host.
# Pass at runtime:  -z "spider.maxDepth=5 spider.maxChildren=20"
