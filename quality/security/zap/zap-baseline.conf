# OWASP ZAP Baseline scan rule configuration — omiiCARE_QA (Milestone 7)
#
# Format (tab-separated): <RULE_ID>\t<ACTION>\t<OPTIONAL COMMENT>
# ACTION is one of: WARN | FAIL | IGNORE
#   WARN   - report the alert as a warning (does not fail the build)
#   FAIL   - report the alert and fail the scan (non-zero exit)
#   IGNORE - suppress the alert entirely (use with justification)
#
# Consumed by zap-baseline.py via the `-c zap-baseline.conf` option.
# Rule IDs are ZAP passive/active scan plugin IDs. See:
#   https://www.zaproxy.org/docs/alerts/
#
# EDUCATIONAL / local-infra-only. Tune deliberately; every IGNORE needs a reason.

