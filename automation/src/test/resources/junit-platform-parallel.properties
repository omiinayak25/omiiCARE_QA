# =============================================================================
# JUnit 5 (JUnit Platform) parallel execution configuration.
#
# This is a SEPARATE profile file; it does NOT replace junit-platform.properties.
# To activate it, point the JUnit Platform at this file, e.g. via Surefire:
#
#   <configuration>
#     <properties>
#       <configurationParameters>
#         junit.platform.config.file.name=junit-platform-parallel.properties
#       </configurationParameters>
#     </properties>
#   </configuration>
#
# or by copying these keys into the active config. Keep the values aligned with
# the TestNG suite (thread-count=4) so both runners exert comparable concurrency.
# =============================================================================

# Master switch: turn parallel execution on.
junit.jupiter.execution.parallel.enabled=true

# Default = CONCURRENT so classes/methods run in parallel unless a test opts out
# with @Execution(ExecutionMode.SAME_THREAD) or @ResourceLock.
junit.jupiter.execution.parallel.mode.default=concurrent

# Run classes in parallel as well as methods within them.
junit.jupiter.execution.parallel.mode.classes.default=concurrent

# Fixed-size pool of 4 worker threads to match testng-parallel.xml thread-count.
junit.jupiter.execution.parallel.config.strategy=fixed
junit.jupiter.execution.parallel.config.fixed.parallelism=4

# Carry over the Cucumber glue/reporting from the default config so a combined
# run does not lose BDD wiring.
cucumber.glue=com.omiicare.qa.automation.bdd
cucumber.publish.quiet=true
cucumber.plugin=pretty, summary
