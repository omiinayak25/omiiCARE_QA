# omiiCARE_QA automation — default framework configuration.
# Overridden (highest precedence first) by JVM system properties, then env vars.
omii.env=local

# System Under Test (the omiiCARE web app + API).
omii.adapter.local_omiicare.baseUri=http://localhost:8080/api/v1
omii.frontend.baseUrl=http://localhost:5173

# Demo credentials for the synthetic SUT account (non-prod only).
omii.sut.username=demo.admin
omii.sut.password=Admin@12345

# Browser matrix selection for UI runs (chromium|firefox|webkit).
omii.ui.browser=chromium
omii.ui.headless=true
