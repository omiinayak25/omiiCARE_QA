# =============================================================================
# omiiCARE — Grafana dashboard provider
# -----------------------------------------------------------------------------
# Tells Grafana to load dashboard JSON files from /var/lib/grafana/dashboards
# (mounted from infrastructure/monitoring/grafana/dashboards).
# Mounted at /etc/grafana/provisioning/dashboards/dashboards.yml
# =============================================================================

apiVersion: 1

providers:
  - name: omiicare-dashboards
    orgId: 1
    folder: omiiCARE
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
