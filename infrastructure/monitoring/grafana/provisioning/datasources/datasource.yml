# =============================================================================
# omiiCARE — Grafana datasource provisioning
# -----------------------------------------------------------------------------
# Auto-registers Prometheus as the default datasource on Grafana startup.
# Mounted at /etc/grafana/provisioning/datasources/datasource.yml
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      httpMethod: POST
